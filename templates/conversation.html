<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Conversations | Ctexi-Bot</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>

<body>



<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="logo">
      <img src="{{ url_for('static', filename='logo.png') }}" class="logo-img">
      <div>
        <h2>Ctexi-Bot</h2>
        <p>Admin Panel</p>
      </div>
    </div>

    <nav class="menu">
      <a href="/api/dashboard/dashboard_index">📊 Dashboard</a>
      <a class="active" href="/api/dashboard/conversations">💬 Conversations</a>
      <a href="/api/dashboard/faq">📚 FAQ</a>
      <a href="/api/dashboard/users">👤 Users</a>
    </nav>

    <form method="POST" action="/api/auth/logout">
      <button class="logout">Déconnexion</button>
    </form>

  </aside>

    

  <!-- MAIN -->
  <main class="main">


    <header class="topbar">
     <h1>💬 Suivi des Conversations</h1>
   </header>

    <div class="action-bar">
      <a href="/api/dashboard/conversations/export" class="btn export">
        ⬇ Export CSV
      </a>
    </div>

    

    <!-- FILTRES -->
    <div class="filters">
      <input type="number" id="userFilter" placeholder="Filtrer par ID user">
      <button onclick="filterByUser()">Filtrer</button>

      <input type="text" id="searchInput" placeholder="Rechercher message...">
    </div>

    <!-- LISTE -->
    <div id="conversationList" class="conversation-list"></div>

  </main>

</div>

<script src="{{ url_for('static', filename='conversation.js') }}"></script>





</body>
</html>
