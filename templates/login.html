<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion | Ctexi Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='/auth.css') }}">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Connexion</h2>

        <form id="login-form">
    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" required>
    </div>

    <div class="input-group">
        <label>Mot de passe</label>
        <input type="password" id="mdp" required>
    </div>

    <button type="submit">Se connecter</button>
</form>
<div id="toast" class="toast"></div>
<script>
const loginForm = document.getElementById("login-form");
const toast = document.getElementById("toast");

// fonction toast moderne
function showToast(message, type="success") {
    toast.textContent = message;
    toast.className = "toast show " + type;

    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}

loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const mdp = document.getElementById("mdp").value.trim();

    if (!email || !mdp) {
        return showToast("Veuillez remplir tous les champs", "error");
    }

    try {
        const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, mdp })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.message || "Erreur connexion");

        // stockage
        localStorage.setItem("token", data.token);
        localStorage.setItem("user_name", data.user.nom);

        // ✅ toast au lieu de alert
        showToast("Connexion réussie 🎉", "success");

        // redirection douce après 1.5s
        setTimeout(() => {
            window.location.href = data.redirect;
        }, 1500);

    } catch (err) {
        console.error(err);
        showToast(err.message, "error");
    }
});
</script>

        <p class="switch">
            Pas encore inscrit ? <a href="{{ url_for('auth.register') }}">Créer un compte</a>
        </p>
    </div>
</div>

</body>
</html>
