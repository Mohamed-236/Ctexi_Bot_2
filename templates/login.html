<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion | Ctexi Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='/auth.css') }}">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Connexion</h2>

        <form id="login-form">
    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" required>
    </div>

    <div class="input-group">
        <label>Mot de passe</label>
        <input type="password" id="mdp" required>
    </div>

    <button type="submit">Se connecter</button>
</form>

<script>
const loginForm = document.getElementById("login-form");

loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const mdp = document.getElementById("mdp").value.trim();
    if (!email || !mdp) return alert("Veuillez remplir tous les champs");

    try {
        const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, mdp })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.message || "Erreur connexion");

        // Stockage automatique pour le bot
        localStorage.setItem("token", data.token);
        localStorage.setItem("user_name", data.user.nom);

        alert("Connexion réussie !");
        window.location.href = "/api/auth/index"; // Redirection vers la page principale

    } catch (err) {
        console.error(err);
        alert(err.message);
    }
});
</script>

        <p class="switch">
            Pas encore inscrit ? <a href="{{ url_for('auth.register') }}">Créer un compte</a>
        </p>
    </div>
</div>

</body>
</html>
