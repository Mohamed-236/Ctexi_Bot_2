<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Operations | Ctexi-Bot</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>

<body>

<div class="container">

  <h1>⚙️ Gestion Operations & Patterns</h1>

  <!-- ================= TOP FORMS ================= -->
  <div class="top-forms">

    <!-- OPERATION FORM -->
    <div class="form-card">
      <h2>➕ Ajouter Operation</h2>

      <input type="text" id="name" placeholder="Nom operation">
      <input type="text" id="description" placeholder="Description">

      <button onclick="addOperation()">Ajouter Operation</button>
    </div>

    <!-- PATTERN FORM -->
    <div class="form-card">
      <h2>🧠 Ajouter Pattern</h2>

      <!-- ⚠️ PLUS DE ID OPERATION -->
      <input type="number" id="intent_id" placeholder="ID Intent">
      <input type="text" id="phrase" placeholder="Phrase utilisateur">

      <button onclick="addPattern()">Ajouter Pattern</button>

      <!-- INFO UX -->
      <p id="selectedOpText" style="margin-top:10px;color:#555;">
        Aucune opération sélectionnée
      </p>
    </div>

  </div>

  <!-- ================= OPERATIONS LIST ================= -->
  <div class="section">
    <h2>📌 Liste Operations</h2>
    <div id="opList"></div>
  </div>






<script src="{{ url_for('static', filename='operations.js') }}"></script>

</body>
</html>
